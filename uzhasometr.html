<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ужасометр-1</title>
<style>
  :root{ --cream:#d6cba8; --ink:#2e2a24; --muted:#6f6a58; }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:18px;padding:24px 16px 40px;
    background:radial-gradient(circle at 50% 30%, #2f2f2a 0%, #1c1c19 80%);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:#e9e4d5;
  }
  .wrap{width:100%;max-width:720px}
  h1{text-align:center;font-size:20px;font-weight:500;letter-spacing:6px;margin:0 0 4px;color:#cfc7b2}
  .sub{text-align:center;font-size:13px;color:#8d8975;margin:0 0 14px}
  .gauge{width:100%;display:block;filter:drop-shadow(0 14px 26px rgba(0,0,0,.45))}
  .console{margin-top:14px;background:var(--cream);border:2px solid #9c9277;border-radius:10px;padding:14px 18px 16px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.15)}
  .row{display:flex;align-items:center;gap:12px}
  .end{font-size:12px;color:var(--muted);min-width:34px}
  .end.r{text-align:right}
  input[type=range]{-webkit-appearance:none;appearance:none;flex:1;height:6px;border-radius:4px;background:linear-gradient(90deg,#4CA64C,#E0A81C,#E8783C,#D83A30);outline:none;cursor:pointer}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:20px;height:20px;border-radius:50%;background:#2e2a24;border:2px solid #cfc7b2;cursor:pointer}
  input[type=range]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:#2e2a24;border:2px solid #cfc7b2;cursor:pointer}
  .verdict{text-align:center;margin-top:12px;font-size:15px;color:var(--muted)}
  .verdict b{font-weight:600}
  .btns{display:flex;gap:12px;justify-content:center;margin-top:14px;flex-wrap:wrap}
  .btn{font-family:inherit;font-size:13px;letter-spacing:1px;font-weight:600;color:#e9e4d5;background:#262626;border:2px solid #111;border-radius:8px;padding:10px 18px;cursor:pointer;box-shadow:0 3px 0 #000, inset 0 1px 0 rgba(255,255,255,.12);transition:transform .05s, box-shadow .05s;display:inline-flex;align-items:center;gap:8px}
  .btn:active{transform:translateY(2px);box-shadow:0 1px 0 #000}
  .btn.measure{background:#262626;border-color:#111;color:#e9e4d5}
  .led{width:10px;height:10px;border-radius:50%;background:#6a6a6a;box-shadow:inset 0 0 2px rgba(0,0,0,.6)}
  .btn.on{transform:translateY(2px);background:#1b1b1b;box-shadow:0 1px 0 #000, inset 0 2px 5px rgba(0,0,0,.55)}
  .btn.on .led{background:#4CA64C;box-shadow:0 0 6px #4CA64C}
  .btn.sw.on .led{background:#d6342a;box-shadow:0 0 7px #d6342a}
  .foot{text-align:center;font-size:11px;color:#6a6657;margin-top:18px;letter-spacing:1px}
</style>
</head>
<body>

    <path d="M214.43 266.36 A130 130 0 0 1 260.86 196.86 L273.03 212.73 A110 110 0 0 0 233.75 271.53 Z" fill="#4CA64C"/>
    <path d="M260.86 196.86 A130 130 0 0 1 340 170 L340 190 A110 110 0 0 0 273.03 212.73 Z" fill="#E0A81C"/>
    <path d="M340 170 A130 130 0 0 1 419.14 196.86 L406.97 212.73 A110 110 0 0 0 340 190 Z" fill="#E8783C"/>
    <path d="M419.14 196.86 A130 130 0 0 1 465.57 266.36 L446.25 271.53 A110 110 0 0 0 406.97 212.73 Z" fill="#D83A30"/>
    <line x1="214.43" y1="266.36" x2="198.98" y2="262.22" stroke="#2e2a24" stroke-width="2.5"/>
    <line x1="260.86" y1="196.86" x2="251.12" y2="184.16" stroke="#2e2a24" stroke-width="2.5"/>
    <line x1="340" y1="170" x2="340" y2="154" stroke="#2e2a24" stroke-width="2.5"/>
    <line x1="419.14" y1="196.86" x2="428.88" y2="184.16" stroke="#2e2a24" stroke-width="2.5"/>
    <line x1="465.57" y1="266.36" x2="481.02" y2="262.22" stroke="#2e2a24" stroke-width="2.5"/>
    <line x1="224.69" y1="239.98" x2="215.82" y2="235.36" stroke="#2e2a24" stroke-width="1.5"/>
    <line x1="240.42" y1="216.44" x2="232.76" y2="210.01" stroke="#2e2a24" stroke-width="1.5"/>
    <line x1="285.06" y1="182.18" x2="280.84" y2="173.12" stroke="#2e2a24" stroke-width="1.5"/>
    <line x1="311.87" y1="173.08" x2="309.70" y2="163.32" stroke="#2e2a24" stroke-width="1.5"/>
    <line x1="368.13" y1="173.08" x2="370.30" y2="163.32" stroke="#2e2a24" stroke-width="1.5"/>
    <line x1="394.94" y1="182.18" x2="399.16" y2="173.12" stroke="#2e2a24" stroke-width="1.5"/>
    <line x1="439.58" y1="216.44" x2="447.24" y2="210.01" stroke="#2e2a24" stroke-width="1.5"/>

  <div class="console">
    <div class="row">
      <span class="end">Норм</span>
      <input type="range" min="0" max="100" step="1" value="82" id="lvl" aria-label="Рівень жаху">
      <span class="end r">ужас³</span>
    </div>
    <div class="verdict">Прилад показує: <b id="verdict" style="color:#A32D2D">ужас-ужас-ужас</b></div>
    <div class="btns">
      <button class="btn measure" id="btnM">ВИМІР</button>
      <button class="btn sw" id="btnW"><span class="led"></span>ПАНІКА</button>
      <button class="btn" id="btnS"><span class="led"></span>ЗГЛАЖУВАННЯ</button>
    </div>
  </div>

  <div class="foot">ГОСТ 14-88 · поверено · не кантовать</div>
</div>

<script>
(function(){
  var s=document.getElementById('lvl'),n=document.getElementById('needle'),v=document.getElementById('verdict'),lamp=document.getElementById('lamp'),bM=document.getElementById('btnM'),bW=document.getElementById('btnW'),bS=document.getElementById('btnS');
  var target=82,pos=82,vel=0,jit=0,smooth=false,meas=false,sweep=false,sph=0,t1=null,t2=null,last=performance.now();
  var Z=[{m:25,t:'Норм',c:'#3B6D11',l:'#4CA64C'},{m:50,t:'ужас',c:'#99560c',l:'#E0A81C'},{m:75,t:'ужас-ужас',c:'#993c1d',l:'#E8783C'},{m:101,t:'ужас-ужас-ужас',c:'#A32D2D',l:'#d6342a'}];
  function zf(x){for(var i=0;i<Z.length;i++){if(x<Z[i].m)return Z[i];}return Z[3];}
  function sv(){bS.classList.toggle('on',smooth);bW.classList.toggle('on',sweep);}
  function measure(){sweep=false;meas=true;if(t1)clearTimeout(t1);if(t2)clearTimeout(t2);target=0;t1=setTimeout(function(){target=4+Math.random()*94;t2=setTimeout(function(){meas=false;s.value=Math.round(target);},2600);},560);sv();}
  bM.addEventListener('click',measure);
  bW.addEventListener('click',function(){sweep=!sweep;if(sweep){meas=false;if(t1)clearTimeout(t1);if(t2)clearTimeout(t2);sph=Math.asin(Math.max(-1,Math.min(1,(pos-50)/50)));}else{target=pos;}sv();});
  bS.addEventListener('click',function(){smooth=!smooth;sv();});
  s.addEventListener('input',function(){meas=false;sweep=false;if(t1)clearTimeout(t1);if(t2)clearTimeout(t2);target=+s.value;sv();});
  function frame(now){
    var dt=(now-last)/1000;last=now;if(dt>0.05)dt=0.05;if(dt<0)dt=0;
    if(sweep){sph+=dt*5.6;pos=50+50*Math.sin(sph);vel=0;}
    else if(meas){var k=34,c=2*Math.sqrt(34)*0.42,a=k*(target-pos)-c*vel;vel+=a*dt;pos+=vel*dt;}
    else{pos+=(target-pos)*Math.min(1,dt*14);vel=0;}
    if(pos<0){pos=0;if(vel<0)vel=0;}if(pos>100){pos=100;if(vel>0)vel=0;}
    if(meas||sweep)s.value=Math.round(pos);
    if(!smooth){jit+=(Math.random()-0.5)*0.9;jit*=0.85;if(jit>1.7)jit=1.7;if(jit<-1.7)jit=-1.7;}
    else{jit*=0.8;if(Math.abs(jit)<0.02)jit=0;}
    var beta=-75+1.5*pos+jit;
    n.setAttribute('transform','rotate('+beta.toFixed(2)+' 340 300)');
    var z=zf(pos);v.textContent=z.t;v.style.color=z.c;lamp.setAttribute('fill',z.l);
    requestAnimationFrame(frame);
  }
  sv();requestAnimationFrame(frame);
})();
</script>
</body>
</html>
